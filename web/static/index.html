<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI团队作战指挥台</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f172a; color: #e2e8f0; }
nav { background: #1e293b; padding: 12px 24px; display: flex; align-items: center; gap: 24px; border-bottom: 1px solid #334155; }
nav .logo { font-size: 18px; font-weight: 700; color: #38bdf8; }
nav a { color: #94a3b8; text-decoration: none; font-size: 14px; padding: 6px 12px; border-radius: 6px; }
nav a:hover, nav a.active { color: #e2e8f0; background: #334155; }
.container { max-width: 1200px; margin: 0 auto; padding: 24px; }
.stats-bar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
.stat-card { background: #1e293b; border-radius: 12px; padding: 20px; border: 1px solid #334155; text-decoration: none; color: inherit; transition: .18s ease; display: block; }
.stat-card:hover { border-color: #38bdf8; transform: translateY(-1px); }
.stat-card .label { font-size: 12px; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; }
.stat-card .value { font-size: 32px; font-weight: 700; margin-top: 4px; }
.stat-card .sub { font-size: 12px; color: #94a3b8; margin-top: 6px; }
.trend { margin-top: 10px; font-size: 12px; font-weight: 600; display: inline-flex; align-items: center; gap: 6px; }
.trend.up { color: #6ee7b7; }
.trend.down { color: #fca5a5; }
.trend.flat { color: #cbd5e1; }
.agents-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
.agent-card { background: #1e293b; border-radius: 12px; padding: 20px; border: 1px solid #334155; transition: border-color 0.2s; text-decoration: none; color: inherit; }
.agent-card:hover { border-color: #38bdf8; }
.agent-card .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.agent-card .name { font-size: 16px; font-weight: 600; }
.status-badge { padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; text-transform: uppercase; }
.status-running { background: #064e3b; color: #6ee7b7; }
.status-idle { background: #1e293b; color: #94a3b8; border: 1px solid #475569; }
.status-blocked, .status-error { background: #7f1d1d; color: #fca5a5; }
.agent-card .detail { font-size: 13px; color: #94a3b8; margin-top: 8px; }
.agent-card .detail span { color: #e2e8f0; }
.projects-list { margin-top: 32px; display: grid; gap: 14px; }
.project-group { background: #1e293b; border-radius: 14px; border: 1px solid #334155; overflow: hidden; }
.project-group summary { list-style: none; cursor: pointer; display: flex; justify-content: space-between; align-items: center; padding: 16px 18px; }
.project-group summary::-webkit-details-marker { display: none; }
.project-group .group-main { display: flex; flex-direction: column; gap: 6px; }
.project-group .group-name { font-size: 16px; font-weight: 700; }
.project-group .group-meta { font-size: 12px; color: #94a3b8; }
.project-group .versions { padding: 0 18px 18px; display: grid; gap: 10px; }
.project-version { border: 1px solid #334155; border-radius: 12px; padding: 14px; display: grid; grid-template-columns: 1.2fr .9fr .9fr .8fr 1.4fr; gap: 10px; align-items: center; background: rgba(15, 23, 42, 0.45); }
.project-version.active { border-color: #ef4444; box-shadow: inset 0 0 0 1px rgba(239, 68, 68, 0.35); }
.project-version.archived { opacity: .62; }
.version-name { font-weight: 700; display: flex; align-items: center; gap: 8px; }
.version-tag, .active-tag, .stage { padding: 3px 10px; border-radius: 999px; font-size: 11px; display: inline-block; }
.version-tag { background: #334155; color: #cbd5e1; }
.active-tag { background: #7f1d1d; color: #fecaca; }
.stage { background: #1e3a5f; color: #93c5fd; }
.blocked { color: #fca5a5; font-size: 12px; }
.project-link { color: #38bdf8; text-decoration: none; font-size: 12px; }
.section-title { font-size: 18px; font-weight: 700; margin-bottom: 16px; color: #e2e8f0; }
.refresh-info { font-size: 11px; color: #64748b; text-align: right; margin-bottom: 8px; }
.freshness-banner { border-radius: 10px; padding: 10px 16px; font-size: 13px; font-weight: 600; margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }
.freshness-ok { background: #1e293b; border: 1px solid #334155; color: #94a3b8; }
.freshness-stale { background: rgba(127,29,29,.35); border: 1px solid #ef4444; color: #fca5a5; }
.group-done-badge { background: #334155; color: #94a3b8; border-radius: 999px; padding: 4px 12px; font-size: 12px; font-weight: 600; white-space: nowrap; }
@media (max-width: 900px) {
  .stats-bar { grid-template-columns: repeat(2, 1fr); }
  .project-version { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<nav>
  <div class="logo">🧠 AI团队指挥台</div>
  <a href="/" class="active">总览</a>
  <a href="/team/agents">Agent作战</a>
  <a href="/team/projects">项目流转</a>
  <a href="/team/artifacts">成果物</a>
  <a href="/team/alerts">告警中心</a>
</nav>

<div class="container">
  <div id="freshness-banner"></div>
  <div class="stats-bar" id="stats"></div>

  <div class="section-title">🤖 Agent 实时状态</div>
  <div class="agents-grid" id="agents"></div>

  <div class="section-title" style="margin-top:32px">📋 项目流转</div>
  <div class="projects-list" id="projects"></div>

  <div class="refresh-info" id="refresh-info">每30秒自动刷新</div>
</div>

<script>
const API = '';

async function fetchJSON(url) {
  const resp = await fetch(url);
  if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
  return resp.json();
}

function timeAgo(str) {
  if (!str) return '—';
  const diff = (Date.now() - new Date(str).getTime()) / 1000;
  if (diff < 60) return `${Math.floor(diff)}秒前`;
  if (diff < 3600) return `${Math.floor(diff/60)}分钟前`;
  if (diff < 86400) return `${Math.floor(diff/3600)}小时前`;
  return `${Math.floor(diff/86400)}天前`;
}

function escapeHtml(value) {
  return String(value ?? '').replace(/[&<>"']/g, (char) => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[char]));
}

function trendMarkup(trend) {
  if (!trend) return '<div class="trend flat">≈ 与昨日持平</div>';
  const icons = { up: '↑', down: '↓', flat: '→' };
  const labels = {
    up: `较昨日 +${trend.delta}`,
    down: `较昨日 ${trend.delta}`,
    flat: '与昨日持平',
  };
  return `<div class="trend ${trend.direction}">${icons[trend.direction] || '→'} ${labels[trend.direction] || '与昨日持平'}</div>`;
}

async function renderStats() {
  const stats = await fetchJSON(API + '/api/stats');
  document.getElementById('stats').innerHTML = `
    <a class="stat-card" href="/team/agents"><div class="label">活跃Agent</div><div class="value" style="color:#6ee7b7">${stats.agents.active}/${stats.agents.total}</div><div class="sub">点击进入 Agent 白盒页</div>${trendMarkup(stats.agents.delta)}</a>
    <a class="stat-card" href="/team/projects"><div class="label">项目总数</div><div class="value" style="color:#93c5fd">${stats.projects.total}</div><div class="sub">阻塞: ${stats.projects.blocked}，点击进入项目流转</div>${trendMarkup(stats.projects.delta)}</a>
    <a class="stat-card" href="/team/agents#recent-events"><div class="label">24h事件</div><div class="value">${stats.events_24h}</div><div class="sub">点击查看最近事件</div>${trendMarkup(stats.events_delta)}</a>
    <a class="stat-card" href="/team/projects?filter=blocked"><div class="label">阻塞项目</div><div class="value" style="color:#fca5a5">${stats.projects.blocked}</div><div class="sub">点击筛选 blocked 项目</div>${trendMarkup(stats.projects.blocked_delta)}</a>
  `;
  renderFreshness(stats.last_collector_run);
}

function renderFreshness(lastRun) {
  const banner = document.getElementById('freshness-banner');
  if (!lastRun) { banner.innerHTML = ''; return; }
  const ageMin = (Date.now() - new Date(lastRun).getTime()) / 60000;
  const timeStr = new Date(lastRun).toLocaleString('zh-CN', { hour12: false });
  const stale = ageMin > 10;
  banner.innerHTML = `<div class="freshness-banner ${stale ? 'freshness-stale' : 'freshness-ok'}">${stale ? '⚠️ 数据可能过期' : '🟢'}&nbsp;数据更新于: ${escapeHtml(timeStr)}</div>`;
}

async function renderAgents() {
  const agents = await fetchJSON(API + '/api/agents');
  const roleEmoji = {peter:'⚙️', guard:'🛡️', doraemon:'🔔', atlas:'🚀', jarvis:'🏠', munger:'💰'};
  document.getElementById('agents').innerHTML = agents.map(a => `
    <a class="agent-card" href="/team/agents?agent=${encodeURIComponent(a.agent_name)}">
      <div class="header">
        <div class="name">${roleEmoji[a.agent_name]||'🤖'} ${a.agent_name}</div>
        <span class="status-badge status-${a.status}">${a.status}</span>
      </div>
      <div class="detail">项目: <span>${escapeHtml(a.current_project || '—')}</span></div>
      <div class="detail">阶段: <span>${escapeHtml(a.current_stage || '—')}</span></div>
      <div class="detail">最近事件: <span>${a.timeline_events || 0}</span></div>
      <div class="detail">A2A / Sub-agent: <span>${a.a2a_events || 0} / ${a.subagent_events || 0}</span></div>
      <div class="detail">最后活动: <span>${timeAgo(a.last_action_time)}</span></div>
    </a>
  `).join('');
}

function parseProject(projectId) {
  const raw = String(projectId || '').trim();
  if (!raw) return null;
  const match = raw.match(/^(.*?)(?:-(v\d+(?:\.\d+)?))$/i);
  return match ? { baseName: match[1], versionLabel: match[2].toUpperCase(), rawName: raw } : { baseName: raw, versionLabel: '主线', rawName: raw };
}

const ACTIVE_STAGES = new Set(['developing', 'testing', 'planned', 'draft']);
const BLOCKED_STAGES = new Set(['blocked']);

function isArchivedStage(stage) {
  return ['done', 'archived', 'cancelled'].includes(String(stage || '').toLowerCase());
}

function groupPriority(group) {
  if (group.versions.some(v => ACTIVE_STAGES.has(String(v.current_stage || '').toLowerCase()))) return 0;
  if (group.versions.some(v => BLOCKED_STAGES.has(String(v.current_stage || '').toLowerCase()))) return 1;
  return 2;
}

function groupProjects(projects) {
  const groups = new Map();
  projects.forEach((project) => {
    const parsed = parseProject(project.project_id);
    if (!parsed) return;
    const item = { ...project, ...parsed };
    if (!groups.has(item.baseName)) groups.set(item.baseName, []);
    groups.get(item.baseName).push(item);
  });
  return [...groups.entries()].map(([baseName, versions]) => {
    versions.sort((a, b) => {
      const activeDelta = Number(isArchivedStage(a.current_stage)) - Number(isArchivedStage(b.current_stage));
      if (activeDelta !== 0) return activeDelta;
      return new Date(b.updated_at || 0) - new Date(a.updated_at || 0);
    });
    const active = versions.find((item) => !isArchivedStage(item.current_stage)) || versions[0];
    return { baseName, versions, active };
  }).sort((a, b) => {
    const pa = groupPriority(a), pb = groupPriority(b);
    if (pa !== pb) return pa - pb;
    return new Date(b.active?.updated_at || 0) - new Date(a.active?.updated_at || 0);
  });
}

async function renderProjects() {
  const projects = await fetchJSON(API + '/api/projects');
  const grouped = groupProjects(projects);
  document.getElementById('projects').innerHTML = grouped.map((group) => {
    const priority = groupPriority(group);
    const isDoneGroup = priority === 2;
    const openAttr = isDoneGroup ? '' : 'open';
    const doneCount = group.versions.filter(v => isArchivedStage(v.current_stage)).length;
    const summaryRight = isDoneGroup
      ? `<span class="group-done-badge">${doneCount} 已完成版本</span>`
      : `<a class="project-link" href="/team/projects">查看详情 →</a>`;
    return `
    <details class="project-group" ${openAttr}>
      <summary>
        <div class="group-main">
          <div class="group-name">${escapeHtml(group.baseName)}</div>
          <div class="group-meta">共 ${group.versions.length} 个版本，活跃版本 ${escapeHtml(group.active?.versionLabel || '—')}</div>
        </div>
        ${summaryRight}
      </summary>
      <div class="versions">
        ${group.versions.map((p) => `
          <div class="project-version ${p.rawName === group.active?.rawName ? 'active' : ''} ${isArchivedStage(p.current_stage) ? 'archived' : ''}">
            <div>
              <div class="version-name">${escapeHtml(p.rawName)} <span class="version-tag">${escapeHtml(p.versionLabel)}</span> ${p.rawName === group.active?.rawName ? '<span class="active-tag">活跃</span>' : ''}</div>
              <div style="color:#94a3b8;font-size:12px;margin-top:6px">更新于 ${timeAgo(p.updated_at)}</div>
            </div>
            <div><span class="stage">${escapeHtml(p.current_stage || 'unknown')}</span></div>
            <div style="color:#94a3b8;font-size:13px">${escapeHtml(p.stage_owner || '—')}</div>
            <div style="color:#94a3b8;font-size:13px">${p.is_overtime ? '⚠️ 超时' : '正常'}</div>
            <div class="blocked">${escapeHtml(p.block_reason || '')}</div>
          </div>
        `).join('')}
      </div>
    </details>
    `;
  }).join('') || '<div style="color:#94a3b8">暂无项目数据</div>';
}

async function refresh() {
  try {
    await Promise.all([renderStats(), renderAgents(), renderProjects()]);
    document.getElementById('refresh-info').textContent = `最近刷新 ${new Date().toLocaleTimeString('zh-CN', { hour12: false })}`;
  } catch(e) { console.error('Refresh failed:', e); }
}

refresh();
setInterval(refresh, 30000);
</script>
</body>
</html>
