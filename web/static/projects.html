<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI团队指挥台 - 项目流转</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f172a; color: #e2e8f0; }
nav { background: #1e293b; padding: 12px 24px; display: flex; align-items: center; gap: 24px; border-bottom: 1px solid #334155; }
nav .logo { font-size: 18px; font-weight: 700; color: #38bdf8; }
nav a { color: #94a3b8; text-decoration: none; font-size: 14px; padding: 6px 12px; border-radius: 6px; }
nav a:hover, nav a.active { color: #e2e8f0; background: #334155; }
.container { max-width: 1280px; margin: 0 auto; padding: 24px; }
.page-header { display: flex; justify-content: space-between; align-items: flex-end; gap: 16px; margin-bottom: 24px; }
.page-header h1 { font-size: 30px; }
.page-header p { color: #94a3b8; margin-top: 8px; }
.filters { display: flex; gap: 10px; align-items: center; }
.badge-btn { border: 1px solid #334155; background: #0f172a; color: #e2e8f0; padding: 10px 12px; border-radius: 10px; cursor: pointer; text-decoration: none; }
.badge-btn.active, .badge-btn:hover { border-color: #38bdf8; color: #38bdf8; }
.project-groups { display: grid; gap: 14px; }
.group-card { border: 1px solid #334155; border-radius: 14px; overflow: hidden; background: #1e293b; }
.group-card summary { list-style: none; cursor: pointer; display: flex; align-items: center; justify-content: space-between; gap: 16px; padding: 16px 18px; }
.group-card summary::-webkit-details-marker { display: none; }
.group-main { display: flex; flex-direction: column; gap: 6px; }
.group-name { font-size: 17px; font-weight: 700; }
.group-meta { color: #94a3b8; font-size: 12px; }
.group-active { color: #fca5a5; font-size: 12px; font-weight: 600; }
.version-list { display: grid; gap: 10px; padding: 0 18px 18px; }
.version-card { border: 1px solid #334155; border-radius: 12px; padding: 14px; display: grid; grid-template-columns: minmax(0, 1.45fr) repeat(3, minmax(88px, .65fr)) minmax(0, 1.25fr) auto; gap: 12px; align-items: center; background: rgba(15, 23, 42, .55); }
.version-card.active { border-color: #ef4444; box-shadow: inset 0 0 0 1px rgba(239, 68, 68, .38); }
.version-card.archived { opacity: .62; }
.version-name { font-weight: 700; display: flex; align-items: center; flex-wrap: wrap; gap: 8px; }
.version-tag, .stage-tag, .active-tag { display: inline-flex; align-items: center; justify-content: center; border-radius: 999px; padding: 3px 10px; font-size: 11px; }
.version-tag { background: #334155; color: #cbd5e1; }
.stage-tag { background: #1e3a5f; color: #93c5fd; }
.active-tag { background: #7f1d1d; color: #fecaca; }
.muted { color: #94a3b8; font-size: 12px; }
.block-reason { color: #fca5a5; font-size: 12px; }
.version-actions { display: flex; justify-content: flex-end; gap: 8px; }
.button { border: 1px solid #475569; background: #0f172a; color: #e2e8f0; padding: 8px 12px; border-radius: 10px; cursor: pointer; font-size: 13px; text-decoration: none; }
.button:hover { border-color: #38bdf8; color: #38bdf8; }
.empty { color: #94a3b8; text-align: center; padding: 48px 20px; background: #1e293b; border: 1px solid #334155; border-radius: 16px; }
.group-done-badge { background: #334155; color: #94a3b8; border-radius: 999px; padding: 4px 12px; font-size: 12px; font-weight: 600; white-space: nowrap; }
@media (max-width: 900px) {
  .page-header { flex-direction: column; align-items: flex-start; }
  .version-card { grid-template-columns: 1fr; }
  .version-actions { justify-content: flex-start; }
}
</style>
</head>
<body>
<nav>
  <div class="logo">🧠 AI团队指挥台</div>
  <a href="/">总览</a>
  <a href="/team/agents">Agent作战</a>
  <a href="/team/projects" class="active">项目流转</a>
  <a href="/team/artifacts">成果物</a>
  <a href="/team/alerts">告警中心</a>
</nav>

<div class="container">
  <div class="page-header">
    <div>
      <h1>项目流转</h1>
      <p>按主项目聚合版本，活跃版本置顶高亮。成果物改为独立页面承载，不再塞进右侧侧栏。</p>
    </div>
    <div class="filters">
      <a class="badge-btn" id="all-filter" href="/team/projects">全部项目</a>
      <a class="badge-btn" id="blocked-filter" href="/team/projects?filter=blocked">只看 blocked</a>
    </div>
  </div>

  <div class="project-groups" id="project-groups">
    <div class="empty">正在加载项目数据…</div>
  </div>
</div>

<script>
const API = '';
const query = new URLSearchParams(location.search);
const blockedOnly = query.get('filter') === 'blocked';

document.getElementById(blockedOnly ? 'blocked-filter' : 'all-filter').classList.add('active');

function escapeHtml(value) {
  return String(value ?? '').replace(/[&<>"']/g, (char) => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[char]));
}

function timeAgo(str) {
  if (!str) return '—';
  const diff = (Date.now() - new Date(str).getTime()) / 1000;
  if (!Number.isFinite(diff)) return str;
  if (diff < 60) return `${Math.max(1, Math.floor(diff))}秒前`;
  if (diff < 3600) return `${Math.floor(diff / 60)}分钟前`;
  if (diff < 86400) return `${Math.floor(diff / 3600)}小时前`;
  return `${Math.floor(diff / 86400)}天前`;
}

function formatTime(value) {
  if (!value) return '—';
  const date = new Date(value);
  if (Number.isNaN(date.getTime())) return value;
  return date.toLocaleString('zh-CN', { hour12: false });
}

function parseProject(projectId) {
  const raw = String(projectId || '').trim();
  if (!raw) return null;
  const match = raw.match(/^(.*?)(?:-(v\d+(?:\.\d+)?))$/i);
  return match ? { baseName: match[1], versionLabel: match[2].toUpperCase(), rawName: raw } : { baseName: raw, versionLabel: '主线', rawName: raw };
}

const ACTIVE_STAGES = new Set(['developing', 'testing', 'planned', 'draft']);
const BLOCKED_STAGES = new Set(['blocked']);

function isArchivedStage(stage) {
  return ['done', 'archived', 'cancelled'].includes(String(stage || '').toLowerCase());
}

function groupPriority(group) {
  if (group.versions.some(v => ACTIVE_STAGES.has(String(v.current_stage || '').toLowerCase()))) return 0;
  if (group.versions.some(v => BLOCKED_STAGES.has(String(v.current_stage || '').toLowerCase()))) return 1;
  return 2;
}

function groupProjects(projects) {
  const groups = new Map();
  projects.forEach((project) => {
    const parsed = parseProject(project.project_id);
    if (!parsed) return;
    const item = { ...project, ...parsed };
    if (!groups.has(item.baseName)) groups.set(item.baseName, []);
    groups.get(item.baseName).push(item);
  });
  return [...groups.entries()].map(([baseName, versions]) => {
    versions.sort((a, b) => {
      const activeDelta = Number(isArchivedStage(a.current_stage)) - Number(isArchivedStage(b.current_stage));
      if (activeDelta !== 0) return activeDelta;
      return new Date(b.updated_at || 0) - new Date(a.updated_at || 0);
    });
    const active = versions.find((item) => !isArchivedStage(item.current_stage)) || versions[0];
    return { baseName, versions, active };
  }).sort((a, b) => {
    const pa = groupPriority(a), pb = groupPriority(b);
    if (pa !== pb) return pa - pb;
    return new Date(b.active?.updated_at || 0) - new Date(a.active?.updated_at || 0);
  });
}

async function fetchJSON(url) {
  const resp = await fetch(url);
  if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
  return resp.json();
}

async function refresh() {
  const projects = await fetchJSON(`${API}/api/projects${blockedOnly ? '?filter=blocked' : ''}`);
  const groups = groupProjects(projects);
  const container = document.getElementById('project-groups');
  if (!groups.length) {
    container.innerHTML = `<div class="empty">${blockedOnly ? '当前没有 blocked 项目。' : '暂无项目数据。'}</div>`;
    return;
  }
  container.innerHTML = groups.map((group) => {
    const priority = groupPriority(group);
    const isDoneGroup = priority === 2;
    const openAttr = isDoneGroup ? '' : 'open';
    const doneCount = group.versions.filter(v => isArchivedStage(v.current_stage)).length;
    const summaryRight = isDoneGroup
      ? `<span class="group-done-badge">${doneCount} 已完成版本</span>`
      : `<div class="group-active">活跃版本: ${escapeHtml(group.active?.rawName || '—')}</div>`;
    return `
    <details class="group-card" ${openAttr}>
      <summary>
        <div class="group-main">
          <div class="group-name">${escapeHtml(group.baseName)}</div>
          <div class="group-meta">共 ${group.versions.length} 个版本，最近更新 ${escapeHtml(timeAgo(group.active?.updated_at))}</div>
        </div>
        ${summaryRight}
      </summary>
      <div class="version-list">
        ${group.versions.map((project) => `
          <div class="version-card ${project.rawName === group.active?.rawName ? 'active' : ''} ${isArchivedStage(project.current_stage) ? 'archived' : ''}">
            <div>
              <div class="version-name">
                ${escapeHtml(project.rawName)}
                <span class="version-tag">${escapeHtml(project.versionLabel)}</span>
                ${project.rawName === group.active?.rawName ? '<span class="active-tag">活跃</span>' : ''}
              </div>
              <div class="muted" style="margin-top:6px">更新时间 ${escapeHtml(formatTime(project.updated_at))}</div>
            </div>
            <div><span class="stage-tag">${escapeHtml(project.current_stage || 'unknown')}</span></div>
            <div class="muted">负责人 ${escapeHtml(project.stage_owner || '—')}</div>
            <div class="muted">${project.is_overtime ? '⚠️ 已超时' : '进度正常'}</div>
            <div class="block-reason">${escapeHtml(project.block_reason || '')}</div>
            <div class="version-actions">
              <a class="button" href="/team/artifacts?project_id=${encodeURIComponent(project.project_id)}">查看成果物</a>
            </div>
          </div>
        `).join('')}
      </div>
    </details>
    `;
  }).join('');
}

refresh().catch((error) => {
  document.getElementById('project-groups').innerHTML = '<div class="empty">项目数据加载失败，请检查 /api/projects。</div>';
  console.error(error);
});
</script>
</body>
</html>
